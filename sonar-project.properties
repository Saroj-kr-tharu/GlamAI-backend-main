sonar.projectKey=cms
sonar.projectName=CMS Project
sonar.projectVersion=1.0
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.tests=src/__tests__
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Exclude directories (adjust based on your project)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js,**/uploads/**,**/public/**,**/assets/**,**/k8s/**,**/coverage/**,**/*.yml,**/*.yaml,**/Dockerfile,**/nginx.conf,**/*.d.ts